spring:
  application:
    name: notification-service
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1

aws:
  region: ${AWS_REGION:eu-north-1}
  access-key-id: ${AWS_ACCESS_KEY_ID:}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
  from-email: ${FROM_EMAIL:}

management:
  health:
    mail:
      enabled: false


server:
  port: 8080

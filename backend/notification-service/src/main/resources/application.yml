spring:
  application:
    name: notification-service
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
  mail:
    host: ${SPRING_MAIL_HOST:email-smtp.eu-north-1.amazonaws.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
            required: ${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:true}

management:
  health:
    mail:
      enabled: false


server:
  port: 8080
